<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web3 Tipping dApp - Stellar</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            width: 100%;
            max-width: 1100px; /* Diperlebar untuk menampung layout menyamping */
            margin: auto;
        }
        h2 { text-align: center; color: #f1c40f; margin-bottom: 5px; }
        p.subtitle { text-align: center; color: #aaaaaa; font-size: 14px; margin-bottom: 25px; }
        
        /* Layout Grid Baru */
        .grid-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr; /* 3 Kolom */
            gap: 20px;
            align-items: start;
        }
        .grid-col {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .section-box {
            background-color: #2a2a2a;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 0; /* Margin diatur oleh gap grid-col */
        }
        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            color: #f1c40f;
            margin-bottom: 10px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 13px; margin-bottom: 5px; color: #dddddd; }
        input, textarea {
            width: 100%; padding: 10px; border: 1px solid #444; border-radius: 6px;
            background-color: #121212; color: #ffffff; box-sizing: border-box;
        }
        
        button {
            width: 100%; padding: 12px; border: none; border-radius: 6px;
            font-weight: bold; cursor: pointer; transition: 0.2s; margin-bottom: 8px;
        }
        .btn-primary { background-color: #f1c40f; color: #1a1a1a; }
        .btn-primary:hover { background-color: #d4ac0d; }
        .btn-secondary { background-color: #2980b9; color: #fff; }
        .btn-secondary:hover { background-color: #2471a3; }
        .btn-outline { background-color: transparent; border: 1px solid #f1c40f; color: #f1c40f; }
        .btn-outline:hover { background-color: rgba(241, 196, 15, 0.1); }
        .btn-danger { background-color: transparent; border: 1px solid #e74c3c; color: #e74c3c; padding: 8px; font-size: 13px; margin-top: 10px; }
        .btn-danger:hover { background-color: rgba(231, 76, 60, 0.1); }
        .btn-small { padding: 8px; font-size: 12px; margin-top: 5px; }
        
        .wallet-info { font-size: 13px; color: #00ff88; word-break: break-all; margin-top: 10px;}
        .wallet-error { font-size: 13px; color: #e74c3c; margin-top: 10px; display: none;}
        
        .history-list { list-style: none; padding: 0; margin: 0; }
        .history-item { background-color: #1a1a1a; padding: 10px; border-radius: 5px; margin-bottom: 5px; font-size: 12px; border-left: 3px solid #f1c40f; }

        /* Responsif untuk layar kecil */
        @media (max-width: 850px) {
            .grid-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>💰 Web3 Tipping dApp</h2>
        <p class="subtitle">Support creators via Stellar Testnet</p>

        <div class="grid-layout">
            <div class="grid-col">
                <div class="section-box">
                    <div class="section-title">1. Wallet Authentication</div>
                    
                    <button id="btnLogin" class="btn-outline" onclick="connectWallet()">🔗 Connect Freighter Wallet</button>
                    <div id="walletError" class="wallet-error">❌ Freighter extension not detected!</div>
                    
                    <div id="walletData" style="display: none;">
                        <div class="wallet-info">✅ Connected: <span id="myAddress">...</span></div>
                        <div class="wallet-info">💳 XLM Balance: <strong id="myBalance">Loading...</strong></div>
                        <button class="btn-secondary btn-small" onclick="fundMyWallet()">💧 Fund My Wallet (10k XLM)</button>
                        <button class="btn-danger btn-small" onclick="disconnectWallet()">🚪 Disconnect</button>
                    </div>
                </div>

                <div class="section-box">
                    <div class="section-title">2. Transaction Details</div>
                    <div class="input-group">
                        <label>Target Wallet (Public Key):</label>
                        <input type="text" id="targetWallet" placeholder="G... (Enter target address)">
                    </div>
                    <div class="input-group">
                        <label>Amount (XLM):</label>
                        <input type="number" id="amount" placeholder="Example: 50">
                    </div>
                    <div class="input-group">
                        <label>Support Message (Max 28 chars):</label>
                        <input type="text" id="message" placeholder="Keep up the great work!" maxlength="28">
                    </div>
                </div>
            </div>

            <div class="grid-col">
                <div class="section-box">
                    <div class="section-title">3. Execution Options</div>
                    <button class="btn-primary" id="btnSendTip" onclick="sendRealTransaction()">
                        A. Send Tip (Sign Transaction)
                    </button>
                    <button class="btn-secondary" onclick="sendFromFriendbot()">
                        B. Request Friendbot to Fund Target
                    </button>
                </div>
            </div>

            <div class="grid-col">
                <div class="section-box" id="historySection" style="display: none;">
                    <div class="section-title">4. Recent History</div>
                    <button class="btn-outline btn-small" onclick="loadHistory()">🔄 Refresh History</button>
                    <ul id="historyList" class="history-list">
                        <li class="history-item" style="color: #aaa;">Loading history...</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import freighterApi from 'https://esm.sh/@stellar/freighter-api';
        import * as StellarModule from 'https://esm.sh/@stellar/stellar-sdk';
        
        // Anti-Bungkus ESM
        const StellarSdk = StellarModule.default || StellarModule;

        let userPublicKey = "";
        
        // Server & Hardcode Testnet Passphrase
        const server = new StellarSdk.Horizon.Server('https://horizon-testnet.stellar.org');
        const TESTNET_PASSPHRASE = 'Test SDF Network ; September 2015'; 

        window.connectWallet = async () => {
            const errorMsg = document.getElementById('walletError');
            errorMsg.style.display = 'none';

            try {
                const isInstalled = await freighterApi.isConnected();
                if (!isInstalled) {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = "❌ Freighter extension not installed!";
                    return;
                }

                const accessResponse = await freighterApi.requestAccess();
                
                // Satpam Pintar
                let pubKey = "";
                if (typeof accessResponse === 'string') {
                    pubKey = accessResponse;
                } else if (typeof accessResponse === 'object' && accessResponse !== null) {
                    pubKey = accessResponse.address || accessResponse.publicKey || "";
                }

                if (pubKey && pubKey.length > 50) {
                    userPublicKey = pubKey;
                    document.getElementById('btnLogin').style.display = 'none';
                    document.getElementById('walletData').style.display = 'block';
                    document.getElementById('historySection').style.display = 'block';
                    
                    const shortAddress = userPublicKey.substring(0, 5) + "..." + userPublicKey.substring(userPublicKey.length - 4);
                    document.getElementById('myAddress').innerText = shortAddress;
                    
                    checkBalance(userPublicKey);
                    loadHistory();
                } else {
                    throw new Error("Akses ditolak atau ditutup oleh pengguna.");
                }
            } catch (error) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = "❌ Error: " + error.message;
            }
        };

        window.disconnectWallet = () => {
            userPublicKey = "";
            document.getElementById('btnLogin').style.display = 'block';
            document.getElementById('walletData').style.display = 'none';
            document.getElementById('historySection').style.display = 'none';
        };

        window.checkBalance = async (publicKey) => {
            try {
                const account = await server.loadAccount(publicKey);
                const nativeBalance = account.balances.find(b => b.asset_type === 'native');
                document.getElementById('myBalance').innerText = nativeBalance ? `${nativeBalance.balance} XLM` : "0 XLM";
            } catch (error) {
                document.getElementById('myBalance').innerText = "Account not funded (0 XLM)";
            }
        };

        window.fundMyWallet = async () => {
            if (!userPublicKey) return;
            alert("Requesting 10,000 XLM for your own wallet...\nPlease wait a few seconds.");
            try {
                const response = await fetch(`https://friendbot.stellar.org/?addr=${userPublicKey}`);
                if (response.ok) {
                    alert("✅ SUCCESS! Your wallet has been funded.");
                    checkBalance(userPublicKey);
                    loadHistory();
                } else {
                    alert("❌ FAILED! Your wallet might already be funded.");
                }
            } catch (e) {
                alert("Network error occurred.");
            }
        };

        window.loadHistory = async () => {
            if (!userPublicKey) return;
            const list = document.getElementById('historyList');
            list.innerHTML = "<li class='history-item' style='color:#aaa;'>Loading history...</li>";
            
            try {
                const response = await fetch(`https://horizon-testnet.stellar.org/accounts/${userPublicKey}/payments?order=desc&limit=5`);
                if (response.ok) {
                    const data = await response.json();
                    list.innerHTML = "";
                    if(data._embedded.records.length === 0) {
                        list.innerHTML = "<li class='history-item'>No transactions found.</li>";
                        return;
                    }
                    data._embedded.records.forEach(tx => {
                        if(tx.asset_type === 'native' || tx.type === 'create_account') {
                            let amount = tx.amount || tx.starting_balance;
                            let date = new Date(tx.created_at).toLocaleString();
                            let type = tx.from === userPublicKey ? '🔴 Sent' : '🟢 Received';
                            if (tx.type === 'create_account') type = '🟢 Funded (Friendbot)';

                            list.innerHTML += `<li class='history-item'>
                                <strong>${type}: ${amount} XLM</strong><br>
                                <span style="color:#aaa;">${date}</span>
                            </li>`;
                        }
                    });
                }
            } catch (error) {
                list.innerHTML = "<li class='history-item'>Network Error.</li>";
            }
        };

        window.sendRealTransaction = async () => {
            const target = document.getElementById('targetWallet').value;
            const amount = document.getElementById('amount').value;
            const msg = document.getElementById('message').value;

            if (!userPublicKey) return alert("Connect Freighter first!");
            if (!target || !amount) return alert("Fill Target Wallet and Amount!");
            if (target === userPublicKey) return alert("Cannot send XLM to yourself. Coba kirim ke Account 2!");

            const btn = document.getElementById('btnSendTip');
            btn.innerText = "Processing... Check Freighter!";
            btn.disabled = true;

            try {
                const sourceAccount = await server.loadAccount(userPublicKey);
                const TESTNET_PASSPHRASE = 'Test SDF Network ; September 2015';

                const transaction = new StellarSdk.TransactionBuilder(sourceAccount, {
                    fee: StellarSdk.BASE_FEE,
                    networkPassphrase: TESTNET_PASSPHRASE
                })
                .addOperation(StellarSdk.Operation.payment({
                    destination: target,
                    asset: StellarSdk.Asset.native(),
                    amount: amount.toString()
                }))
                .addMemo(StellarSdk.Memo.text(msg))
                .setTimeout(60)
                .build();

                // Ubah jadi teks sandi base64
                const xdr = transaction.toXDR('base64');

                // Minta tanda tangan Freighter di jaringan Testnet
                const signedResponse = await freighterApi.signTransaction(xdr, {
                    network: 'TESTNET',
                    networkPassphrase: TESTNET_PASSPHRASE
                });

                // Bongkar bungkus X-Ray (UDAH DIPERBAIKI LACINYA)
                let finalSignedXdr = "";
                if (typeof signedResponse === 'string') {
                    finalSignedXdr = signedResponse;
                } else if (typeof signedResponse === 'object' && signedResponse !== null) {
                    if (signedResponse.error) {
                        throw new Error("KELUHAN FREIGHTER: " + signedResponse.error);
                    }
                    
                    // Ini kunci suksesnya: signedTxXdr
                    finalSignedXdr = signedResponse.signedTxXdr || signedResponse.signedTx || signedResponse.tx || "";
                    
                    if (!finalSignedXdr) {
                        throw new Error("Tanda tangan kosong, cek kembali Freighter.");
                    }
                }

                btn.innerText = "Submitting to Blockchain...";
                
                // Jurus Bypass ke Horizon
                const formData = new URLSearchParams();
                formData.append('tx', finalSignedXdr);

                const response = await fetch('https://horizon-testnet.stellar.org/transactions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();

                if (response.ok) {
                    alert("✅ SUCCESS! Tip sent successfully.\nTransaction Hash: " + data.hash);
                    
                    checkBalance(userPublicKey);
                    loadHistory();
                } else {
                    console.error("Stellar Error:", data);
                    alert("❌ TRANSACTION FAILED!\nReason: " + (data.title || "Network rejection"));
                }

            } catch (error) {
                console.error(error);
                alert("❌ TRANSACTION FAILED!\n" + error.message);
            } finally {
                btn.innerText = "A. Send Tip (Sign Transaction)";
                btn.disabled = false;
            }
        };

        window.sendFromFriendbot = async () => {
            const target = document.getElementById('targetWallet').value;
            if (!target || target.length !== 56) return alert("Invalid Target Wallet address.");

            alert(`Requesting Friendbot to fund:\n${target}\nPlease wait...`);
            try {
                const response = await fetch(`https://friendbot.stellar.org/?addr=${target}`);
                if (response.ok) alert("✅ SUCCESS! Target funded.");
                else alert("❌ FAILED! Account already funded or network error.");
            } catch (e) {
                alert("Network error.");
            }
        };
    </script>
</body>
</html>
